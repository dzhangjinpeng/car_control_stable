<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小车稳定版诊断</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #f4f6f7;
      color: #182026;
    }
    body { margin: 0; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      background: #ffffff;
      border-bottom: 1px solid #d9e0e4;
    }
    h1 { margin: 0; font-size: 20px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    nav { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      border: 1px solid #cfd8de;
      background: #ffffff;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.active { background: #1f6f8b; color: #ffffff; border-color: #1f6f8b; }
    main { padding: 18px 22px; display: grid; gap: 16px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 12px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel {
      background: #ffffff;
      border: 1px solid #d9e0e4;
      border-radius: 8px;
      padding: 14px;
    }
    .metric span { display: block; color: #667782; font-size: 13px; }
    .metric strong { display: block; margin-top: 6px; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 8px; border-bottom: 1px solid #e5eaed; text-align: left; vertical-align: top; }
    th { color: #50616b; font-weight: 600; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.5;
      background: #f7f9fa;
      border: 1px solid #e3e8eb;
      border-radius: 6px;
      padding: 10px;
      max-height: 420px;
      overflow: auto;
    }
    .ok { color: #177245; }
    .danger { color: #b42318; font-weight: 700; }
    .muted { color: #667782; }
    .page { display: none; }
    .page.active { display: grid; gap: 16px; }
    @media (max-width: 900px) {
      header { display: block; }
      nav { margin-top: 12px; }
      .grid, .two { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
    @media (max-width: 560px) { .grid, .two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>小车稳定版诊断</h1>
      <div class="muted" id="updated">等待数据</div>
    </div>
    <nav>
      <button class="active" data-page="dashboard">总览</button>
      <button data-page="config">配置</button>
      <button data-page="calibration">校准</button>
      <button data-page="history">历史</button>
    </nav>
  </header>
  <main>
    <section class="page active" id="dashboard">
      <div class="grid">
        <div class="panel metric"><span>模式</span><strong id="mode">-</strong></div>
        <div class="panel metric"><span>输入源</span><strong id="inputSource">-</strong></div>
        <div class="panel metric"><span>循环</span><strong id="loopIndex">-</strong></div>
        <div class="panel metric"><span>急停</span><strong id="estop">-</strong></div>
      </div>
      <div class="panel">
        <h2>驾驶输入</h2>
        <div class="grid">
          <div class="metric"><span>left_x</span><strong id="leftX">-</strong></div>
          <div class="metric"><span>left_y</span><strong id="leftY">-</strong></div>
          <div class="metric"><span>right_x</span><strong id="rightX">-</strong></div>
          <div class="metric"><span>right_y</span><strong id="rightY">-</strong></div>
        </div>
      </div>
      <div class="two">
        <div class="panel">
          <h2>驱动电机</h2>
          <table><thead><tr><th>角色</th><th>ID</th><th>目标</th><th>实测</th><th>误差</th></tr></thead><tbody id="driveRows"></tbody></table>
        </div>
        <div class="panel">
          <h2>转向电机</h2>
          <table><thead><tr><th>角色</th><th>ID</th><th>目标</th><th>实测</th><th>误差</th></tr></thead><tbody id="steerRows"></tbody></table>
        </div>
      </div>
    </section>
    <section class="page" id="config">
      <div class="two">
        <div class="panel"><h2>硬件配置</h2><pre id="hardwareConfig">-</pre></div>
        <div class="panel"><h2>控制配置</h2><pre id="controlConfig">-</pre></div>
        <div class="panel"><h2>输入配置</h2><pre id="inputConfig">-</pre></div>
        <div class="panel"><h2>安全配置</h2><pre id="safetyConfig">-</pre></div>
      </div>
    </section>
    <section class="page" id="calibration">
      <div class="panel">
        <h2>最近校准报告</h2>
        <pre id="calibrationReport">-</pre>
      </div>
    </section>
    <section class="page" id="history">
      <div class="panel">
        <h2>最近遥测</h2>
        <table><thead><tr><th>循环</th><th>模式</th><th>输入源</th><th>急停</th><th>首个驱动目标</th></tr></thead><tbody id="historyRows"></tbody></table>
      </div>
    </section>
  </main>
  <script>
    const fmt = (value) => typeof value === 'number' ? value.toFixed(3) : '-';
    const pretty = (value) => value ? JSON.stringify(value, null, 2) : '暂无数据';
    function rows(items) {
      return (items || []).map((m) => `
        <tr>
          <td>${m.role}</td>
          <td>${m.motor_id}</td>
          <td>${fmt(m.target)} ${m.unit || ''}</td>
          <td>${fmt(m.actual)} ${m.unit || ''}</td>
          <td>${fmt(m.error)}</td>
        </tr>
      `).join('');
    }
    async function api(path) {
      const res = await fetch(path);
      const payload = await res.json();
      return payload.data;
    }
    async function refreshDashboard() {
      const data = await api('/api/v1/telemetry/latest');
      if (!data) return;
      document.getElementById('mode').textContent = data.mode || '-';
      document.getElementById('inputSource').textContent = data.input_source || '-';
      document.getElementById('loopIndex').textContent = data.loop_index ?? '-';
      const estop = Boolean(data.safety && data.safety.emergency_stop);
      const estopEl = document.getElementById('estop');
      estopEl.textContent = estop ? '已触发' : '未触发';
      estopEl.className = estop ? 'danger' : 'ok';
      const input = data.driver_input || {};
      document.getElementById('leftX').textContent = fmt(input.left_x);
      document.getElementById('leftY').textContent = fmt(input.left_y);
      document.getElementById('rightX').textContent = fmt(input.right_x);
      document.getElementById('rightY').textContent = fmt(input.right_y);
      document.getElementById('driveRows').innerHTML = rows(data.drive_motors);
      document.getElementById('steerRows').innerHTML = rows(data.steer_motors);
      document.getElementById('updated').textContent = new Date().toLocaleTimeString();
    }
    async function refreshConfig() {
      document.getElementById('hardwareConfig').textContent = pretty(await api('/api/v1/config/hardware'));
      document.getElementById('controlConfig').textContent = pretty(await api('/api/v1/config/control'));
      document.getElementById('inputConfig').textContent = pretty(await api('/api/v1/config/input'));
      document.getElementById('safetyConfig').textContent = pretty(await api('/api/v1/config/safety'));
    }
    async function refreshCalibration() {
      document.getElementById('calibrationReport').textContent = pretty(await api('/api/v1/calibration/latest'));
    }
    async function refreshHistory() {
      const history = await api('/api/v1/telemetry/history?limit=50') || [];
      document.getElementById('historyRows').innerHTML = history.slice().reverse().map((frame) => {
        const first = frame.drive_motors && frame.drive_motors[0];
        return `<tr><td>${frame.loop_index}</td><td>${frame.mode}</td><td>${frame.input_source}</td><td>${frame.safety && frame.safety.emergency_stop ? '是' : '否'}</td><td>${first ? fmt(first.target) : '-'}</td></tr>`;
      }).join('');
    }
    async function refreshAll() {
      try {
        await refreshDashboard();
        await refreshHistory();
      } catch (err) {
        document.getElementById('updated').textContent = '读取失败';
      }
    }
    document.querySelectorAll('nav button').forEach((button) => {
      button.addEventListener('click', async () => {
        document.querySelectorAll('nav button').forEach((b) => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(button.dataset.page).classList.add('active');
        if (button.dataset.page === 'config') await refreshConfig();
        if (button.dataset.page === 'calibration') await refreshCalibration();
        if (button.dataset.page === 'history') await refreshHistory();
      });
    });
    refreshAll();
    setInterval(refreshAll, 500);
  </script>
</body>
</html>
